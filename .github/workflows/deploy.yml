name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'zenith/frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'zenith/frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd zenith/frontend
          npm ci

      - name: Build
        run: |
          cd zenith/frontend
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://zenith-ai.example.com' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: 'zenith/frontend/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
